<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML/DL</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      color: #fff;
      font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* subtle grid overlay */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* soft vignette */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.6) 100%);
      pointer-events: none;
    }

    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: lowercase;
      text-shadow: 0 0 40px rgba(255,255,255,.15);
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Maleno Santander</h1>
    <p>Machine Learning and Deep Learning Engineer</p>
    <p>I am a machine learning and deep learning engineer with a passion for building scalable and efficient machine learning models. I am currently working on a project to build a recommendation system for a retail company.</p>
    
</body>
</html>
